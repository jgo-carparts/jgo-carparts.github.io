<script>
  const jcForm = document.getElementById("jc-contact-form");
  const formStatus = document.getElementById("form-status");
  const submitBtn = document.getElementById("submit-btn");

  async function handleJcSubmit(event) {
    event.preventDefault(); // 阻止原本的頁面跳轉

    const data = new FormData(event.target);
    submitBtn.value = "傳送中...";
    submitBtn.disabled = true;

    fetch(event.target.action, {
      method: 'POST',
      body: data,
      headers: { 'Accept': 'application/json' }
    }).then(response => {
      if (response.ok) {
        // 核心功能：成功後另開新分頁顯示 Formspree 的感謝頁
        window.open("./thanks.html", "_blank");

        // 在原官網頁面顯示成功訊息
        formStatus.innerHTML = "✓ 已成功送出！感謝您的留言。";
        formStatus.style.color = "#28a745";
        formStatus.style.display = "block";

        jcForm.reset(); // 清空表單
      } else {
        formStatus.innerHTML = "抱歉，送出時發生錯誤。";
        formStatus.style.color = "#dc3545";
        formStatus.style.display = "block";
      }
    }).catch(error => {
      formStatus.innerHTML = "網路連線異常，請稍後再試。";
      formStatus.style.display = "block";
    }).finally(() => {
      submitBtn.value = "發送";
      submitBtn.disabled = false;
    });
  }

  jcForm.addEventListener("submit", handleJcSubmit);
</script>
